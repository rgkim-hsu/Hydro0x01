# SonarCloud 프로젝트 정보
sonar.projectKey=rgkim-hsu_Hydro0x01
sonar.organization=rgkim-hsu

# 프로젝트 메타데이터
sonar.projectName=Hydroponic Automation System
sonar.projectVersion=1.0

# 멀티 언어 소스 지정
sonar.sources=backend/src,frontend/src,firmware/src

# 테스트
sonar.tests=backend/tests,frontend/src/**/*.test.ts,frontend/src/**/*.spec.ts

# Python 백엔드
sonar.python.coverage.reportPaths=backend/coverage.xml

# TypeScript 프론트엔드
sonar.typescript.lcov.reportPaths=frontend/coverage/lcov.info

# 제외
sonar.exclusions=**/node_modules/**,**/venv/**,**/__pycache__/**,**/dist/**,**/.platformio/**,**/build/**,**/.env,**/*.config.js

# Python 버전
sonar.python.version=3.9,3.10,3.11